# See https://wiki.hyprland.org/Configuring/Keywords/
#Application Bindings
$terminal = uwsm app -- ghostty
# $menu = nomad-launch-walker
$menu = wofi
$browser = chromium --new-window --ozone-platform=wayland
$webApp = $browser --app
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, RETURN, exec, $terminal
bindd = SUPER, E, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, uwsm app -- $browser
bindd = SUPER SHIFT, B, Browser (private), exec, uwsm app -- $browser --private
# bindd = SUPER, M, Spotify, nomad-launch-or-focus spotify
bindd = SUPER, T, Activity, exec, $terminal -e btop
bindd = SUPER, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER, SPACE, Launcher, exec, $menu
bindd = SUPER, SLASH, Passwords, exec, uwsm app -- 1password
bindd = SUPER SHIFT, L, Power Menu, exec, nomad-power-menu

# Webapps
bindd = SUPER SHIFT, A, ChatGPT, exec, nomad-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, M, Gmail, exec, nomad-launch-webapp "https://gmail.com"

# Utilities
bindd = SUPER, P, Pseudo window, pseudo # dwindle
bindd = SUPER, J, Toggle split, togglesplit # dwindle
bindd = SUPER, V, Toggle floating, togglefloating
bindd = SUPER, F, Fullscreen, fullscreen
bindd = SUPER, W, Kill active window, killactive
bind = SUPER, M, exit

# Aestetics
bindd = SUPER SHIFT, W, Toggle waybar, exec, bash c 'if pgrep -x waybar; then pkill waybar; else uwsm app -- waybar >/dev/null 2>&1 &; fi'

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0  # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0   # = key
bindd = SUPER, code:20, Expand window up, resizeactive, 0 -100  # - key
bindd = SUPER, code:21, Shrink window down, resizeactive, 0 100   # - key


# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindeld = ,XF86AudioRaiseVolume, Volume Up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume Down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute mircophone, exec, $osdclient --inpute-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, $osdclient --brightness raise
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, $osdclient --brightness lower

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

# Laptop lid switch for "docking"
bindl = , switch:Lid Switch, exec, nomad-clamshell
