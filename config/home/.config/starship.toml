add_newline = false
command_timeout = 500
scan_timeout = 100

"$schema" = 'https://starship.rs/config-schema.json'

# format = "[$directory$git_branch$git_status]($style)($character)"
format = """
$os\
$directory\
${custom.giturl}\
$git_branch\
$git_status\
$fill\
$all\
$line_break\
$character\
"""

palette = "tokyonight_night"

[fill]
disabled = false
symbol = " "

[character]
error_symbol = "[Ô£ù](bold red)"
success_symbol = "[ÔØ»](bold green)"

[line_break]
disabled = false

[cmd_duration]
disabled = true

[directory]
truncation_length = 3
truncation_symbol = ".../"
repo_root_style = "bold blue"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[package]
disabled = false

[time]
disabled = true
time_format = "%R"
format = "[[ ´É║ $time ](fg:yellow bg:foam)]($style)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="´Éê "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="´èû "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="´à▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="´×í "
else
    GIT_REMOTE_SYMBOL="´çÆ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
format = "[ $branch]($style) "
style = "fg:lavender"

[git_status]
format     = '[$all_status]($style)'
style      = "bold teal"
ahead      = "Ôçí${count} "
diverged   = "ÔçòÔçí${ahead_count}Ôçú${behind_count} "
behind     = "Ôçú${count} "
conflicted = "¯«½ "
up_to_date = "´Çî "
untracked  = "? "
modified   = "¯®▒ "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[os]
disabled = true
format = "[$symbol ]($style)"
style = "fg:teal"

